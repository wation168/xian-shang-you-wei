name: Daily Lottery Update

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-lottery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch latest lottery results
        run: python scripts/fetch_lottery_results.py

      - name: Regenerate lottery HTML pages
        run: python scripts/generate_lottery_final.py --data-dir scripts/lottery_data --output-dir backend/frontend/lottery

      - name: Check for changes
        id: check
        run: |
          git diff --quiet backend/frontend/lottery/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/frontend/lottery/
          git commit -m "daily: update lottery results $(date +%Y-%m-%d)"
          git push
