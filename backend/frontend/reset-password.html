<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>重設密碼 — 線上有位</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-d:#157a5a;
  --bg:#1a1a18;--bg2:#242422;--bg3:#2e2e2c;
  --text:#ffffff;--text2:rgba(255,255,255,.7);--text3:rgba(255,255,255,.4);
  --border:rgba(255,255,255,.08);--radius:14px;
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;max-width:400px;width:100%;padding:36px 28px}
.logo{text-align:center;font-size:22px;font-weight:900;margin-bottom:4px}
.logo em{color:var(--green);font-style:normal}
.sub{text-align:center;font-size:13px;color:var(--text3);margin-bottom:28px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text3);margin-bottom:6px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;font-size:14px;color:var(--text);font-family:inherit;outline:none;transition:border .2s}
.field input:focus{border-color:var(--green)}
.btn{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;transition:background .2s}
.btn:hover{background:var(--green-d)}
.btn:disabled{opacity:.5;cursor:default}
.err{font-size:12px;margin:8px 0 4px;min-height:18px;text-align:center;color:#f87171}
.ok{color:var(--green)}
.back{display:block;text-align:center;margin-top:16px;font-size:12px;color:var(--text3);text-decoration:none;transition:color .2s}
.back:hover{color:var(--green)}
</style>
</head>
<body>

<div class="card">
  <div class="logo">線上<em>有位</em></div>
  <div class="sub" id="pageSubtitle">設定新密碼</div>

  <div id="invalidMsg" style="display:none;text-align:center;padding:20px 0">
    <div style="font-size:36px;margin-bottom:12px">⚠️</div>
    <p style="color:var(--text2);font-size:14px">連結無效或已過期，請重新申請忘記密碼</p>
    <a href="/index.html" class="back" style="margin-top:20px;display:inline-block">返回登入</a>
  </div>

  <div id="resetForm">
    <div class="field">
      <label>新密碼（6 碼以上）</label>
      <input type="password" id="newPwd" placeholder="••••••••" autocomplete="new-password"/>
    </div>
    <div class="field">
      <label>確認新密碼</label>
      <input type="password" id="newPwd2" placeholder="••••••••" autocomplete="new-password"/>
    </div>
    <div class="err" id="resetErr"></div>
    <button class="btn" id="resetBtn" onclick="doReset()">確認重設密碼</button>
  </div>

  <div id="successMsg" style="display:none;text-align:center;padding:20px 0">
    <div style="font-size:36px;margin-bottom:12px">✅</div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:16px">密碼已重設成功！</p>
    <a href="/index.html" class="back">返回登入</a>
  </div>

  <a href="/index.html" class="back" id="backLink">← 返回登入</a>
</div>

<script>
const params = new URLSearchParams(location.search);
const token  = params.get('token') || '';

if(!token){
  document.getElementById('resetForm').style.display = 'none';
  document.getElementById('invalidMsg').style.display = 'block';
  document.getElementById('backLink').style.display   = 'none';
  document.getElementById('pageSubtitle').textContent = '連結無效';
}

document.getElementById('newPwd').addEventListener('keydown', e => {
  if(e.key === 'Enter') document.getElementById('newPwd2').focus();
});
document.getElementById('newPwd2').addEventListener('keydown', e => {
  if(e.key === 'Enter') doReset();
});

async function doReset(){
  const pwd  = document.getElementById('newPwd').value;
  const pwd2 = document.getElementById('newPwd2').value;
  const errEl = document.getElementById('resetErr');
  errEl.textContent = ''; errEl.className = 'err';
  if(!pwd){ errEl.textContent = '請輸入新密碼'; return; }
  if(pwd.length < 6){ errEl.textContent = '密碼至少 6 個字元'; return; }
  if(pwd !== pwd2){ errEl.textContent = '兩次密碼不一致'; return; }
  const btn = document.getElementById('resetBtn');
  btn.textContent = '重設中...'; btn.disabled = true;
  try{
    const API = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? 'http://localhost:8000' : 'https://api.softglow-ai.com';
    const r = await fetch(`${API}/reset-password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: pwd }),
      signal: AbortSignal.timeout(10000)
    });
    const data = await r.json();
    if(!r.ok){
      if(data.detail && (data.detail.includes('過期') || data.detail.includes('無效'))){
        document.getElementById('resetForm').style.display = 'none';
        document.getElementById('invalidMsg').style.display = 'block';
        document.getElementById('backLink').style.display   = 'none';
      } else {
        errEl.textContent = data.detail || '重設失敗，請稍後再試';
      }
      return;
    }
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('successMsg').style.display = 'block';
    document.getElementById('backLink').style.display   = 'none';
  } catch(e){
    errEl.textContent = '連線失敗，請稍後再試';
  } finally {
    btn.textContent = '確認重設密碼'; btn.disabled = false;
  }
}
</script>
</body>
</html>
