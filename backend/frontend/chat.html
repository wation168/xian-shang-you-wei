<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>線上有位 討論室</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d1a;color:#f3e8ff;font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* 頂部導航 */
#chat-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:rgba(20,6,38,.98);border-bottom:1px solid rgba(216,180,254,.12);flex-shrink:0;backdrop-filter:blur(10px)}
#chat-nav-left{display:flex;align-items:center;gap:10px}
#chat-nav-back{background:none;border:none;color:#c084e0;font-size:20px;cursor:pointer;padding:2px 8px;line-height:1}
#chat-nav-title{font-size:15px;font-weight:700;color:#f3e8ff;letter-spacing:.3px}
#chat-nav-sub{font-size:11px;color:#6b3a8a;margin-top:2px}
#chat-online-pill{display:flex;align-items:center;gap:5px;background:rgba(216,180,254,.07);border:1px solid rgba(216,180,254,.15);border-radius:20px;padding:5px 12px;font-size:12px;color:#c084e0}
#chat-online-dot{width:7px;height:7px;border-radius:50%;background:#f472b6;box-shadow:0 0 6px #f472b6;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* 主題切換 */
#theme-bar{display:flex;align-items:center;gap:6px;padding:7px 14px;background:rgba(16,4,30,.9);border-bottom:1px solid rgba(216,180,254,.08);flex-shrink:0}
#theme-bar span{font-size:11px;color:#6b3a8a;margin-right:2px}
.thm-btn{background:none;border:1px solid rgba(216,180,254,.15);border-radius:14px;padding:3px 11px;font-size:12px;cursor:pointer;color:#a05ec0;transition:all .2s}
.thm-btn.active{background:rgba(216,180,254,.12);border-color:rgba(216,180,254,.45);color:#f3e8ff}

/* 訊息串 — 核心修正 */
#chat-stream{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 16px 6px;display:flex;flex-direction:column;gap:12px;width:100%;min-width:0}
#chat-stream::-webkit-scrollbar{width:3px}
#chat-stream::-webkit-scrollbar-track{background:transparent}
#chat-stream::-webkit-scrollbar-thumb{background:rgba(216,180,254,.18);border-radius:2px}

.msg-row{display:flex;flex-direction:column;gap:4px;animation:msg-in .3s cubic-bezier(.22,1,.36,1) both;width:100%;min-width:0}
.msg-row.me{align-items:flex-end}
.msg-row.other{align-items:flex-start}
@keyframes msg-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg-meta{display:flex;align-items:center;gap:5px;padding:0 4px}
.msg-name{font-size:12px;color:#c084e0;font-weight:500}
.msg-vip{font-size:10px;background:rgba(236,72,153,.2);color:#f9a8d4;border:1px solid rgba(236,72,153,.3);padding:1px 7px;border-radius:20px;font-weight:600}
.msg-tag{font-size:11px;color:#e879f9;font-weight:700;background:rgba(232,121,249,.1);padding:1px 7px;border-radius:10px;cursor:pointer;text-decoration:none;transition:background .15s}
.msg-tag:hover{background:rgba(232,121,249,.22)}
.msg-bubble{padding:10px 15px;border-radius:20px;font-size:15px;line-height:1.6;max-width:72%;min-width:0;word-break:break-word;word-wrap:break-word}
.other .msg-bubble{background:rgba(30,12,56,.9);border:1px solid rgba(216,180,254,.15);color:#f0e6ff;border-bottom-left-radius:5px}
.me .msg-bubble{background:linear-gradient(135deg,#be185d,#7c3aed);border:1px solid rgba(249,168,212,.2);color:#fff;border-bottom-right-radius:5px;box-shadow:0 2px 12px rgba(147,51,234,.3)}
.msg-time{font-size:10px;color:#5a3070;padding:0 5px}

/* 日期分隔線 */
.date-divider{display:flex;align-items:center;gap:10px;margin:4px 0;opacity:.5}
.date-divider::before,.date-divider::after{content:'';flex:1;height:1px;background:rgba(216,180,254,.15)}
.date-divider span{font-size:11px;color:#7c4b9e;white-space:nowrap}

/* 空狀態 */
#chat-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;opacity:.45;pointer-events:none}
#chat-empty .icon{font-size:44px}
#chat-empty p{font-size:13px;color:#7c4b9e}

/* 輸入區 */
#chat-input-area{flex-shrink:0;background:rgba(16,4,30,.98);border-top:1px solid rgba(216,180,254,.1);padding:10px 12px 16px;backdrop-filter:blur(10px)}

/* 表情選擇器 */
#emoji-picker{display:none;flex-direction:column;margin-bottom:8px;background:rgba(10,2,22,.95);border-radius:14px;border:1px solid rgba(216,180,254,.14);overflow:hidden}
#emoji-tabs{display:flex;border-bottom:1px solid rgba(216,180,254,.1)}
.etab{flex:1;background:none;border:none;padding:7px 4px;font-size:16px;cursor:pointer;opacity:.5;transition:opacity .2s}
.etab.active{opacity:1;border-bottom:2px solid rgba(216,180,254,.5)}
#emoji-grid{display:flex;flex-wrap:wrap;gap:2px;padding:8px;max-height:130px;overflow-y:auto}
.ep{font-size:22px;cursor:pointer;padding:5px;border-radius:8px;transition:background .15s;line-height:1}
.ep:hover{background:rgba(216,180,254,.12)}
#emoji-close{width:100%;background:none;border:none;border-top:1px solid rgba(216,180,254,.08);padding:6px;font-size:11px;color:#6b3a8a;cursor:pointer}
#emoji-close:hover{color:#c084e0}

/* 圖片預覽 */
#img-preview-wrap{display:none;align-items:center;gap:8px;margin-bottom:8px;padding:6px 8px;background:rgba(216,180,254,.06);border-radius:10px;border:1px solid rgba(216,180,254,.12)}
#img-preview{max-height:60px;max-width:80px;border-radius:6px;object-fit:cover}
#img-preview-name{flex:1;font-size:12px;color:#c084e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#img-preview-rm{background:none;border:none;color:#7c4b9e;font-size:16px;cursor:pointer;padding:2px 4px;line-height:1}

#stock-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
#stock-prefix{font-size:13px;color:#7c4b9e;font-weight:600;flex-shrink:0}
#stock-input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(216,180,254,.12);color:#f3e8ff;border-radius:10px;padding:6px 11px;font-size:16px;outline:none;letter-spacing:1px}
#stock-input::placeholder{color:#5a3070;font-size:13px;letter-spacing:0}
#msg-row{display:flex;gap:6px;align-items:center}
#emoji-btn{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.07);cursor:pointer;font-size:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .2s}
#emoji-btn:hover{background:rgba(255,255,255,.12)}
#img-btn{width:36px;height:36px;border-radius:50%;border:none;background:rgba(255,255,255,.07);cursor:pointer;font-size:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .2s}
#img-btn:hover{background:rgba(255,255,255,.12)}
#img-file{display:none}
#msg-input{flex:1;background:rgba(255,255,255,.06);border:1px solid rgba(216,180,254,.15);color:#f3e8ff;border-radius:22px;padding:10px 16px;font-size:16px;outline:none;transition:border-color .2s;min-width:0}
#msg-input:focus{border-color:rgba(216,180,254,.4)}
#msg-input::placeholder{color:#5a3070}
#send-btn{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,#db2777,#7c3aed);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;touch-action:manipulation;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 10px rgba(147,51,234,.4);transition:transform .1s,box-shadow .1s}
#send-btn:active{transform:scale(.93);box-shadow:0 1px 6px rgba(147,51,234,.3)}
#send-btn svg{width:15px;height:15px}
/* 圖片訊息泡泡 */
.msg-img{max-width:220px;max-height:220px;border-radius:12px;display:block;cursor:pointer;transition:opacity .2s}
.msg-img:hover{opacity:.85}
/* 圖片燈箱 */
#lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;align-items:center;justify-content:center;cursor:pointer}
#lightbox img{max-width:92vw;max-height:88vh;border-radius:10px;box-shadow:0 4px 40px rgba(0,0,0,.6)}

/* 深色主題 */
body.dark{background:#060d1a;color:#e2eaf5}
body.dark #chat-nav{background:rgba(4,10,22,.98);border-bottom-color:#152840}
body.dark #chat-nav-title{color:#e2eaf5}
body.dark #chat-nav-sub{color:#2e4a66}
body.dark #chat-nav-back{color:#6b8aad}
body.dark #chat-online-pill{background:rgba(6,13,26,.9);border-color:#1e3a5f;color:#6b8aad}
body.dark #chat-online-dot{background:#4ade80;box-shadow:0 0 6px #4ade80}
body.dark #theme-bar{background:rgba(4,10,22,.9);border-bottom-color:#152840}
body.dark .thm-btn{border-color:#1e3a5f;color:#4a6a8a}
body.dark .thm-btn.active{background:rgba(29,78,216,.18);border-color:#2563eb;color:#93c5fd}
body.dark .other .msg-bubble{background:rgba(12,24,45,.95);border-color:#1e3a5f;color:#e2eaf5}
body.dark .me .msg-bubble{background:linear-gradient(135deg,#1d4ed8,#1e40af);border-color:rgba(96,165,250,.25);box-shadow:0 2px 12px rgba(29,78,216,.3)}
body.dark .msg-name{color:#6b8aad}
body.dark .msg-tag{color:#60a5fa;background:rgba(96,165,250,.1)}
body.dark .msg-time{color:#2e4a66}
body.dark #chat-empty p{color:#2e4a66}
body.dark #chat-input-area{background:rgba(4,10,22,.98);border-top-color:#152840}
body.dark #emoji-picker{background:rgba(2,6,14,.97);border-color:#152840}
body.dark #emoji-tabs{border-bottom-color:#152840}
body.dark #emoji-close{border-top-color:#152840;color:#2e4a66}
body.dark #stock-input,body.dark #msg-input{background:rgba(12,24,45,.8);border-color:#1e3a5f;color:#e2eaf5}
body.dark #stock-input::placeholder,body.dark #msg-input::placeholder{color:#2e4a66}
body.dark #stock-prefix{color:#4a6a8a}
body.dark #emoji-btn,body.dark #img-btn{background:rgba(12,24,45,.8);border:1px solid #1e3a5f}
body.dark #send-btn{background:linear-gradient(135deg,#1d4ed8,#1e40af);box-shadow:0 2px 10px rgba(29,78,216,.4)}
body.dark #msg-input:focus{border-color:rgba(96,165,250,.4)}
body.dark #img-preview-wrap{background:rgba(29,78,216,.08);border-color:#1e3a5f}
body.dark #img-preview-name{color:#6b8aad}

/* 白天主題 */
body.light{background:#f5f7fa;color:#0f2744}
body.light #chat-nav{background:#fff;border-bottom-color:#dde6f0;box-shadow:0 1px 8px rgba(0,0,0,.06)}
body.light #chat-nav-title{color:#0f2744}
body.light #chat-nav-sub{color:#8aaac8}
body.light #chat-nav-back{color:#2563eb}
body.light #chat-online-pill{background:#f0f5ff;border-color:#c7d8ee;color:#4a6080}
body.light #chat-online-dot{background:#16a34a;box-shadow:0 0 5px #16a34a}
body.light #theme-bar{background:#edf1f7;border-bottom-color:#dde6f0}
body.light .thm-btn{border-color:#c7d8ee;color:#5a7899}
body.light .thm-btn.active{background:#dbeafe;border-color:#2563eb;color:#1d4ed8}
body.light .other .msg-bubble{background:#fff;border-color:#dde6f0;color:#0f2744;box-shadow:0 1px 4px rgba(0,0,0,.06)}
body.light .me .msg-bubble{background:linear-gradient(135deg,#2563eb,#1d4ed8);border:none;color:#fff;box-shadow:0 2px 10px rgba(37,99,235,.3)}
body.light .msg-name{color:#5a7899}
body.light .msg-tag{color:#2563eb;background:rgba(37,99,235,.08)}
body.light .msg-time{color:#9ab0c8}
body.light .date-divider::before,.date-divider::after{background:rgba(0,0,0,.1)}
body.light .date-divider span{color:#9ab0c8}
body.light #chat-empty p{color:#9ab0c8}
body.light #chat-input-area{background:#fff;border-top-color:#dde6f0;box-shadow:0 -1px 8px rgba(0,0,0,.05)}
body.light #emoji-picker{background:#f8fafc;border-color:#dde6f0}
body.light #emoji-tabs{border-bottom-color:#dde6f0}
body.light #emoji-close{border-top-color:#dde6f0;color:#9ab0c8}
body.light #stock-input,body.light #msg-input{background:#f0f5fa;border-color:#c7d8ee;color:#0f2744}
body.light #stock-input::placeholder,body.light #msg-input::placeholder{color:#9ab0c8}
body.light #stock-prefix{color:#8aaac8}
body.light #emoji-btn,body.light #img-btn{background:#f0f5fa;border:1px solid #c7d8ee}
body.light #send-btn{background:linear-gradient(135deg,#2563eb,#1d4ed8);box-shadow:0 2px 10px rgba(37,99,235,.35)}
body.light #msg-input:focus{border-color:rgba(37,99,235,.4)}
body.light #chat-stream::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1)}
body.light #img-preview-wrap{background:rgba(37,99,235,.05);border-color:#c7d8ee}
body.light #img-preview-name{color:#5a7899}
</style>
</head>
<body>

<!-- 頂部導航 -->
<div id="chat-nav">
  <div id="chat-nav-left">
    <button id="chat-nav-back" onclick="history.back()">←</button>
    <div>
      <div id="chat-nav-title">💬 線上有位 討論室</div>
      <div id="chat-nav-sub">股市即時討論</div>
    </div>
  </div>
  <div id="chat-online-pill">
    <div id="chat-online-dot"></div>
    <span id="chat-online-cnt">0 在線</span>
  </div>
</div>

<!-- 主題切換 -->
<div id="theme-bar">
  <span>主題</span>
  <button class="thm-btn" data-theme="girly">🌸 少女</button>
  <button class="thm-btn" data-theme="dark">🌙 深色</button>
  <button class="thm-btn" data-theme="light">☀️ 白天</button>
</div>

<!-- 訊息串 -->
<div id="chat-stream">
  <div id="chat-empty">
    <div class="icon">💬</div>
    <p>還沒有訊息，來說點什麼吧！</p>
  </div>
</div>

<!-- 圖片燈箱 -->
<div id="lightbox"><img id="lightbox-img" src="" alt=""></div>

<!-- 輸入區 -->
<div id="chat-input-area">
  <!-- 表情選擇器 -->
  <div id="emoji-picker">
    <div id="emoji-tabs"></div>
    <div id="emoji-grid"></div>
    <button id="emoji-close">關閉 ✕</button>
  </div>
  <!-- 圖片預覽 -->
  <div id="img-preview-wrap">
    <img id="img-preview" src="" alt="">
    <span id="img-preview-name"></span>
    <button id="img-preview-rm">✕</button>
  </div>
  <div id="stock-row">
    <span id="stock-prefix">#</span>
    <input id="stock-input" type="text" placeholder="股票代號（選填，如 2330）" maxlength="6" inputmode="numeric">
  </div>
  <div id="msg-row">
    <button id="emoji-btn">😊</button>
    <button id="img-btn">🖼️</button>
    <input id="img-file" type="file" accept="image/*">
    <input id="msg-input" type="text" placeholder="說點什麼... 或貼上圖片" maxlength="300">
    <button id="send-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
(function(){
  var BACKEND = 'wss://api.softglow-ai.com';

  // 表情分類
  var EMOJI_CATS = [
    { icon:'😊', label:'臉', list:['😂','😭','🥹','😍','🤩','😎','🥲','😅','🤣','😤','😡','🥺','🫡','😴','🤔','😬','🙄','😱','🤯','🫠','😇','🤗','🤭','😏','😒','🙃'] },
    { icon:'📈', label:'股市', list:['📈','📉','💹','📊','💰','💵','💸','🏦','🤑','🎯','🚀','💎','⚡','🔥','⚠️','✅','❌','🔔','🔕','📌','📋','🗓️','⏰','🏆','🎪','🎰'] },
    { icon:'👍', label:'手勢', list:['👍','👎','👏','🙏','💪','🤝','🫶','✌️','🤞','👀','🫵','🤙','☝️','🤟','🖐️','✋','🤜','🤛','👊','💥','🫂','🙌','🤲','🫴','👋','🤚'] },
    { icon:'🌸', label:'其他', list:['🌸','🌈','⭐','🌟','💫','✨','🎉','🎊','🎁','🍀','🌙','☀️','❤️','🧡','💛','💚','💙','💜','🖤','🤍','🥂','🍺','🍜','🍣','🐶','🐱'] },
  ];

  var ws = null;
  var myName = '訪客';
  var pendingImg = null; // { dataUrl, file }

  // 取得登入資訊
  try {
    var token = localStorage.getItem('auth_token') || '';
    if(token){
      var payload = JSON.parse(atob(token.split('.')[1]));
      var emailPrefix = (payload.sub || '').split('@')[0] || '訪客';
      // 優先用 localStorage 暱稱（登入後由 account 頁寫入）
      myName = localStorage.getItem('nickname') || emailPrefix;
    }
  } catch(e){}

  // 主題
  var theme = localStorage.getItem('chat_theme') || 'girly';
  function applyTheme(t){
    theme = t;
    localStorage.setItem('chat_theme', t);
    document.body.className = t === 'girly' ? '' : t;
    document.querySelectorAll('.thm-btn').forEach(function(b){
      b.classList.toggle('active', b.dataset.theme === t);
    });
  }
  applyTheme(theme);
  document.querySelectorAll('.thm-btn').forEach(function(b){
    b.addEventListener('click', function(){ applyTheme(b.dataset.theme); });
  });

  // ── 表情選擇器（多選，不自動關）──
  var ep = document.getElementById('emoji-picker');
  var epTabs = document.getElementById('emoji-tabs');
  var epGrid = document.getElementById('emoji-grid');
  var activeCat = 0;

  function renderCat(idx){
    activeCat = idx;
    epGrid.innerHTML = '';
    EMOJI_CATS[idx].list.forEach(function(e){
      var s = document.createElement('span');
      s.className = 'ep';
      s.textContent = e;
      s.addEventListener('click', function(){
        var inp = document.getElementById('msg-input');
        inp.value += e;
        _msgVal = inp.value;
      });
      epGrid.appendChild(s);
    });
    document.querySelectorAll('.etab').forEach(function(t,i){ t.classList.toggle('active', i===idx); });
  }

  EMOJI_CATS.forEach(function(cat, idx){
    var btn = document.createElement('button');
    btn.className = 'etab' + (idx===0?' active':'');
    btn.textContent = cat.icon;
    btn.title = cat.label;
    btn.addEventListener('click', function(){ renderCat(idx); });
    epTabs.appendChild(btn);
  });
  renderCat(0);

  document.getElementById('emoji-btn').addEventListener('click', function(e){
    e.stopPropagation();
    ep.style.display = ep.style.display === 'flex' ? 'none' : 'flex';
  });
  document.getElementById('emoji-close').addEventListener('click', function(){
    ep.style.display = 'none';
    document.getElementById('msg-input').focus();
  });
  document.addEventListener('click', function(e){
    if(!ep.contains(e.target) && e.target.id !== 'emoji-btn') ep.style.display = 'none';
  });

  // ── 圖片處理 ──
  function setImg(file){
    if(!file || !file.type.startsWith('image/')) return;
    if(file.size > 3*1024*1024){ alert('圖片不超過 3MB'); return; }
    var reader = new FileReader();
    reader.onload = function(ev){
      pendingImg = { dataUrl: ev.target.result, file: file };
      var wrap = document.getElementById('img-preview-wrap');
      document.getElementById('img-preview').src = ev.target.result;
      document.getElementById('img-preview-name').textContent = file.name;
      wrap.style.display = 'flex';
    };
    reader.readAsDataURL(file);
  }

  // 上傳按鈕
  document.getElementById('img-btn').addEventListener('click', function(){
    document.getElementById('img-file').click();
  });
  document.getElementById('img-file').addEventListener('change', function(){
    if(this.files[0]) setImg(this.files[0]);
    this.value = '';
  });

  // 貼上剪貼簿（Ctrl+V）
  document.addEventListener('paste', function(e){
    var items = (e.clipboardData || e.originalEvent.clipboardData).items;
    for(var i=0;i<items.length;i++){
      if(items[i].type.startsWith('image/')){
        setImg(items[i].getAsFile());
        e.preventDefault();
        return;
      }
    }
  });

  // 移除圖片
  document.getElementById('img-preview-rm').addEventListener('click', function(){
    pendingImg = null;
    document.getElementById('img-preview-wrap').style.display = 'none';
    document.getElementById('img-preview').src = '';
  });

  // ── 燈箱 ──
  var lb = document.getElementById('lightbox');
  lb.addEventListener('click', function(){ lb.style.display='none'; });
  function openLightbox(src){ document.getElementById('lightbox-img').src=src; lb.style.display='flex'; }

  // ── 新增訊息泡泡 ──
  function addMsg(data, isMe){
    var empty = document.getElementById('chat-empty');
    if(empty) empty.remove();
    var stream = document.getElementById('chat-stream');
    var row = document.createElement('div');
    row.className = 'msg-row ' + (isMe ? 'me' : 'other');

    var meta = '';
    if(!isMe){
      meta = '<div class="msg-meta">'
        + '<span class="msg-name">' + escHtml(data.username) + '</span>'
        + (data.is_paid ? '<span class="msg-vip">VIP</span>' : '')
        + (data.stock_tag ? '<a class="msg-tag" href="/report/' + escHtml(data.stock_tag) + '" target="_blank">#' + escHtml(data.stock_tag) + '</a>' : '')
        + '</div>';
    } else if(data.stock_tag){
      meta = '<div class="msg-meta">'
        + '<a class="msg-tag" href="/report/' + escHtml(data.stock_tag) + '" target="_blank">#' + escHtml(data.stock_tag) + '</a>'
        + '</div>';
    }

    var content = '';
    if(data.msg_type === 'image' && data.image_data){
      content = '<div class="msg-bubble" style="padding:4px;background:transparent;border:none">'
        + '<img class="msg-img" src="' + escHtml(data.image_data) + '" alt="圖片"></div>';
    } else {
      content = '<div class="msg-bubble">' + escHtml(data.message) + '</div>';
    }

    row.innerHTML = meta + content + '<div class="msg-time">' + escHtml(data.created_at||'') + '</div>';

    // 圖片點擊燈箱
    var img = row.querySelector('.msg-img');
    if(img) img.addEventListener('click', function(){ openLightbox(this.src); });

    stream.appendChild(row);
    stream.scrollTop = stream.scrollHeight;
  }

  function escHtml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── 發送 ──
  var _msgVal = '';
  document.getElementById('msg-input').addEventListener('input', function(){ _msgVal = this.value; });

  function sendMsg(){
    var msg = (_msgVal || document.getElementById('msg-input').value).trim();
    var stock = document.getElementById('stock-input').value.trim();
    if(!msg && !pendingImg) return;
    if(!ws || ws.readyState !== 1){
      document.getElementById('msg-input').placeholder = '連線中，請稍候...';
      setTimeout(function(){
        document.getElementById('msg-input').placeholder = '說點什麼... 或貼上圖片';
      }, 1500);
      return;
    }

    if(pendingImg){
      ws.send(JSON.stringify({ msg_type:'image', image_data: pendingImg.dataUrl, message: msg||'', stock_tag: stock }));
      pendingImg = null;
      document.getElementById('img-preview-wrap').style.display = 'none';
      document.getElementById('img-preview').src = '';
    } else {
      ws.send(JSON.stringify({ msg_type:'text', message: msg, stock_tag: stock }));
    }
    document.getElementById('msg-input').value = ''; _msgVal = '';
    document.getElementById('msg-input').blur();
    ep.style.display = 'none';
  }

  document.getElementById('send-btn').addEventListener('click', sendMsg);
  document.getElementById('msg-input').addEventListener('keydown', function(e){
    if(e.key === 'Enter' && !e.isComposing){ e.preventDefault(); sendMsg(); }
  });

  // ── WebSocket ──
  function connect(){
    var token = localStorage.getItem('auth_token') || '';
    var url = BACKEND + '/ws/chat' + (token ? '?token=' + token : '');
    ws = new WebSocket(url);
    ws.onmessage = function(e){
      try {
        var d = JSON.parse(e.data);
        if(d.type === 'online'){
          document.getElementById('chat-online-cnt').textContent = d.count + ' 在線';
        } else if(d.type === 'message'){
          var isMe = d.username === myName;
          addMsg(d, isMe);
        }
      } catch(err){}
    };
    ws.onclose = function(){ setTimeout(connect, 3000); };
    ws.onerror = function(){ ws.close(); };
  }
  connect();
})();
</script>
</body>
</html>
