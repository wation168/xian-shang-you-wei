<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<meta name="robots" content="noindex, nofollow">
<title>線上有位 — 管理後台</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1D9E75;--green-d:#157a5a;
  --bg:#f2f1ec;--white:#fff;
  --text:#1a1a18;--text2:#4a4948;--text3:#888780;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
  --up:#D63B3B;--radius:10px;--radius-lg:14px;
}
body{font-family:-apple-system,'Noto Sans TC',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:640px;margin:0 auto;padding:24px 16px 60px}

/* ── 登入畫面 ── */
#loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-box{background:var(--white);border-radius:var(--radius-lg);padding:32px 24px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.login-logo{font-size:22px;font-weight:900;text-align:center;margin-bottom:4px}
.login-logo em{color:var(--green);font-style:normal}
.login-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:24px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px;font-weight:500}
.field input{width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);color:var(--text);font-size:15px;outline:none;transition:border .2s}
.field input:focus{border-color:var(--green)}
.btn{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:var(--green-d)}
.btn:disabled{opacity:.6;cursor:default}
.err{font-size:12px;color:var(--up);margin-top:8px;min-height:18px;text-align:center}

/* ── 主後台 ── */
#adminScreen{display:none}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-logo{font-size:16px;font-weight:700}
.topbar-logo em{color:var(--green);font-style:normal}
.topbar-right{display:flex;gap:8px;align-items:center}
.badge-admin{font-size:11px;background:var(--green);color:#fff;border-radius:20px;padding:3px 10px;font-weight:600}
.logout-btn{font-size:12px;color:var(--text3);border:none;background:none;cursor:pointer}

/* ── 卡片 ── */
.card{background:var(--white);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;border:1px solid var(--border)}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px}

/* ── 快捷操作 ── */
.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.action-btn{padding:14px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;line-height:1.5}
.action-btn:hover{border-color:var(--green);color:var(--green);background:rgba(29,158,117,.05)}
.action-btn .icon{font-size:20px;display:block;margin-bottom:4px}
.action-btn.danger:hover{border-color:var(--up);color:var(--up);background:rgba(214,59,59,.05)}

/* ── 開通表單 ── */
.form-row{display:flex;gap:8px;align-items:flex-end;margin-bottom:10px;flex-wrap:wrap}
.form-row .field{flex:1;min-width:140px;margin-bottom:0}
.form-row select{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);color:var(--text);font-size:14px;outline:none;-webkit-appearance:none}
.inline-btn{padding:10px 16px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;height:42px}
.inline-btn.secondary{background:var(--bg);color:var(--text2);border:1px solid var(--border2)}
.result-box{background:var(--bg);border-radius:8px;padding:12px;font-size:12px;font-family:'SF Mono','Fira Code',monospace;color:var(--text2);white-space:pre-wrap;word-break:break-all;min-height:40px;line-height:1.7;display:none}
.result-box.show{display:block}
.result-box.success{color:var(--green)}
.result-box.error{color:var(--up)}

/* ── 選股結果列表 ── */
.picks-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:var(--bg);margin-bottom:6px;cursor:pointer;transition:background .15s;flex-wrap:wrap}
.picks-item:hover{background:#e8e3d8}
.picks-code{font-size:15px;font-weight:700;color:var(--text);min-width:44px}
.picks-name{font-size:12px;color:var(--text3);flex:1}
.picks-score{font-size:14px;font-weight:700;min-width:32px;text-align:right}
.picks-sigs{display:flex;gap:4px;flex-wrap:wrap}
.sig-tag{font-size:10px;padding:2px 8px;border-radius:20px;background:rgba(29,158,117,.12);color:var(--green);font-weight:600}

/* ── 會員卡片 ── */
.mem-card{background:var(--bg);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;border:1px solid var(--border)}
.mem-card:last-child{margin-bottom:0}
.mem-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.mem-id{font-size:11px;color:var(--text3);font-weight:600;min-width:28px}
.mem-email{font-size:13px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mem-status{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
.status-active{background:rgba(29,158,117,.12);color:var(--green)}
.status-expired{background:rgba(214,59,59,.12);color:var(--up)}
.status-free{background:rgba(0,0,0,.06);color:var(--text3)}
.mem-meta{font-size:11px;color:var(--text2);display:grid;grid-template-columns:1fr 1fr;gap:3px 12px;margin-bottom:8px}
.mem-meta span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mem-actions{display:flex;gap:6px}
.mem-btn{flex:1;padding:7px 0;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.mem-btn:hover{border-color:var(--green);color:var(--green)}
.mem-btn.danger{background:#fee2e2;color:#dc2626;border-color:#fca5a5}
.mem-btn.danger:hover{background:#fecaca}

/* ── 統計數字 ── */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.stat-card{background:var(--bg);border-radius:var(--radius);padding:12px;text-align:center}
.stat-val{font-size:26px;font-weight:900;color:var(--green)}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#1a1a18;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:999;transition:transform .3s;pointer-events:none;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

.spin{display:inline-block;width:10px;height:10px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── 留言管理 ── */
.contact-card{background:var(--bg);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;border:1px solid var(--border)}
.contact-card:last-child{margin-bottom:0}
.contact-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:4px}
.contact-meta{font-size:11px;color:var(--text3)}
.contact-email{font-size:12px;font-weight:700;color:var(--green)}
.contact-body{font-size:13px;color:var(--text);margin-bottom:8px;white-space:pre-wrap;word-break:break-word;line-height:1.6}
.contact-actions{display:flex;gap:6px;flex-wrap:wrap}
.contact-reply-list{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.contact-reply-item{background:rgba(29,158,117,.07);border-left:3px solid var(--green);border-radius:0 6px 6px 0;padding:6px 10px;font-size:12px;color:var(--text2)}
.reply-box{display:none;margin-top:8px}
.reply-box textarea{width:100%;padding:8px 10px;border:1px solid var(--border2);border-radius:6px;background:var(--white);color:var(--text);font-size:13px;resize:vertical;min-height:60px;outline:none;font-family:inherit}
.reply-box textarea:focus{border-color:var(--green)}
.reply-box-btns{display:flex;gap:6px;margin-top:6px}
.search-row{margin-bottom:10px}
.search-row input{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:8px;background:var(--bg);color:var(--text);font-size:13px;outline:none}
.search-row input:focus{border-color:var(--green)}
.block-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
.block-item:last-child{border-bottom:none}
.block-email{font-weight:700;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.block-type-badge{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap;flex-shrink:0}
.block-comment{background:rgba(245,158,11,.12);color:#b45309}
.block-login{background:rgba(214,59,59,.12);color:var(--up)}
</style>
</head>
<body>

<!-- ── 登入畫面 ── -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">線上<em>有位</em></div>
    <div class="login-sub">管理後台</div>
    <div class="field">
      <label>管理員密碼</label>
      <input type="password" id="adminPwdInput" placeholder="••••••" autocomplete="off"/>
    </div>
    <div class="err" id="loginErr"></div>
    <button class="btn" onclick="doAdminLogin()">登入</button>
  </div>
</div>

<!-- ── 管理後台 ── -->
<div id="adminScreen">
  <div class="topbar">
    <div class="topbar-logo">線上<em>有位</em> 後台</div>
    <div class="topbar-right">
      <span class="badge-admin">管理員</span>
      <button class="logout-btn" onclick="doAdminLogout()">登出</button>
    </div>
  </div>

  <div class="wrap">

    <!-- 統計 -->
    <div class="card">
      <div class="card-title">📊 會員統計</div>
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-val" id="st-total">—</div><div class="stat-lbl">總會員</div></div>
        <div class="stat-card"><div class="stat-val" id="st-paid" style="color:var(--green)">—</div><div class="stat-lbl">付費中</div></div>
        <div class="stat-card"><div class="stat-val" id="st-free" style="color:var(--text3)">—</div><div class="stat-lbl">免費版</div></div>
        <div class="stat-card"><div class="stat-val" id="st-pv" style="color:#60a5fa">—</div><div class="stat-lbl">累計頁面訪問</div></div>
        <div class="stat-card"><div class="stat-val" id="st-ac" style="color:#a78bfa">—</div><div class="stat-lbl">累計分析次數</div></div>
      </div>
    </div>

    <!-- 快捷操作 -->
    <div class="card">
      <div class="card-title">⚡ 快捷操作</div>
      <div class="action-grid">
        <button class="action-btn" onclick="loadMembers()">
          <span class="icon">👥</span>查看所有會員
        </button>
        <button class="action-btn" onclick="doBackup()">
          <span class="icon">💾</span>備份資料庫
        </button>
        <button class="action-btn" onclick="showSection('grant')">
          <span class="icon">✅</span>開通帳號
        </button>
        <button class="action-btn" onclick="showSection('reset')">
          <span class="icon">🔐</span>重設密碼
        </button>
        <button class="action-btn" onclick="showSection('messages')">
          <span class="icon">💬</span>留言管理
        </button>
        <button class="action-btn" onclick="showSection('blocklist')">
          <span class="icon">🚫</span>封鎖名單
        </button>
        <button class="action-btn" onclick="showSection('earlybird')">
          <span class="icon">🎁</span>早鳥批次升級
        </button>
        <button class="action-btn" onclick="showSection('prebuild')">
          <span class="icon">🔍</span>預建 SEO 選股
        </button>
      </div>
    </div>

    <!-- 開通帳號 -->
    <div class="card" id="sec-grant" style="display:none">
      <div class="card-title">✅ 手動開通帳號</div>
      <div class="form-row">
        <div class="field">
          <label>Email</label>
          <input type="email" id="grantEmail" placeholder="對方 Email"/>
        </div>
      </div>
      <div class="form-row">
        <div class="field">
          <label>方案</label>
          <select id="grantPlan">
            <option value="monthly">月費（30天）</option>
            <option value="quarterly" selected>季費（90天）</option>
            <option value="yearly">年費（365天）</option>
          </select>
        </div>
        <button class="inline-btn" onclick="doGrant()">開通</button>
      </div>
      <div class="result-box" id="grantResult"></div>
    </div>

    <!-- 重設密碼 -->
    <div class="card" id="sec-reset" style="display:none">
      <div class="card-title">🔐 重設會員密碼</div>
      <div class="form-row">
        <div class="field">
          <label>Email</label>
          <input type="email" id="resetEmail" placeholder="對方 Email"/>
        </div>
        <button class="inline-btn" onclick="doReset()">重設</button>
      </div>
      <div class="result-box" id="resetResult"></div>
    </div>

    <!-- 會員列表 -->
    <div class="card" id="sec-members" style="display:none">
      <div class="card-title">👥 所有會員</div>
      <div id="memberList"><div style="color:var(--text3);font-size:13px">載入中...</div></div>
    </div>

    <!-- 留言管理 -->
    <div class="card" id="sec-messages" style="display:none">
      <div class="card-title">💬 留言管理</div>
      <div class="search-row">
        <input type="text" id="msgSearchInput" placeholder="搜尋 email / 留言內容…" oninput="filterContactMessages(this.value)">
      </div>
      <div id="contactMsgList"><div style="color:var(--text3);font-size:13px">載入中...</div></div>
    </div>

    <!-- 封鎖名單 -->
    <div class="card" id="sec-blocklist" style="display:none">
      <div class="card-title">🚫 封鎖名單</div>
      <div id="blockList"><div style="color:var(--text3);font-size:13px">載入中...</div></div>
    </div>

    <!-- 早鳥批次升級 -->
    <div class="card" id="sec-earlybird" style="display:none">
      <div class="card-title">🎁 早鳥批次升級</div>
      <div class="form-row" style="margin-bottom:10px">
        <div class="field">
          <label>升級方案</label>
          <select id="earlybirdPlan">
            <option value="monthly30">月費（30天）</option>
            <option value="quarterly90">季費（90天）</option>
          </select>
        </div>
        <button class="inline-btn secondary" onclick="loadFreeMembers()">載入免費會員</button>
      </div>
      <div id="freeMemberList" style="margin-bottom:10px"></div>
      <div id="earlybirdBatchRow" style="display:none;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px" class="form-row">
        <button class="inline-btn secondary" onclick="toggleSelectAll()" id="selectAllBtn">全選</button>
        <button class="inline-btn" onclick="doEarlyBirdUpgrade()">批次升級 + 寄信</button>
      </div>
      <div class="result-box" id="earlybirdResult"></div>
    </div>

    <!-- 開盤熱門股 -->
    <div class="card" id="sec-prebuild" style="display:none">
      <div class="card-title">🔥 開盤熱門股</div>
      <p style="font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6">手動觸發開盤熱門股抓取（TWSE 成交量前 20），自動更新至 /api/picks/opening。平日 09:15 自動執行。</p>
      <button class="inline-btn" id="runOpeningBtn" onclick="doRunOpeningScan(this)">⚡ 立即抓取開盤熱門股</button>
      <button class="inline-btn" onclick="doClearCache(this)" style="margin-left:8px;background:#7f1d1d;border-color:#ef4444;color:#fca5a5">🗑️ 清除分析快取</button>
      <div class="result-box" id="picksResult" style="margin-top:10px"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
const API = 'https://stock-navigator-api.zeabur.app';
const BACKEND_URL = API;
const ADMIN_KEY = 'xyw2026-liankai-';
const ADMIN_PWD = '630428';

// ── 登入 ──
function doAdminLogin(){
  const pwd = document.getElementById('adminPwdInput').value;
  const err = document.getElementById('loginErr');
  if(pwd !== ADMIN_PWD){
    err.textContent = '密碼錯誤';
    return;
  }
  sessionStorage.setItem('adminAuth','1');
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminScreen').style.display = 'block';
  loadStats();
}
document.getElementById('adminPwdInput').addEventListener('keydown', e=>{
  if(e.key==='Enter') doAdminLogin();
});
function doAdminLogout(){
  sessionStorage.removeItem('adminAuth');
  location.reload();
}
// 自動恢復登入狀態
if(sessionStorage.getItem('adminAuth')==='1'){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminScreen').style.display='block';
  loadStats();
}

// ── 顯示/隱藏區塊 ──
function showSection(name){
  ['grant','reset','members','messages','blocklist','earlybird','prebuild'].forEach(s=>{
    document.getElementById('sec-'+s).style.display = s===name ? 'block' : 'none';
  });
  if(name==='members') loadMembers();
  if(name==='messages') loadContactMessages();
  if(name==='blocklist') loadBlocklist();
}

// ── Toast ──
function toast(msg, dur=2500){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), dur);
}

// ── 統計 ──
async function loadStats(){
  try{
    const [mr, sr] = await Promise.all([
      fetch(`${API}/admin/members?key=${ADMIN_KEY}`),
      fetch(`${API}/api/stats`)
    ]);
    if(!mr.ok) return;
    const data = await mr.json();
    const members = data.members || data || [];
    const paid = members.filter(m=>m.plan!=='free'&&m.is_active).length;
    const free = members.filter(m=>m.plan==='free').length;
    document.getElementById('st-total').textContent = members.length;
    document.getElementById('st-paid').textContent  = paid;
    document.getElementById('st-free').textContent  = free;
    if(sr.ok){
      const s = await sr.json();
      document.getElementById('st-pv').textContent = (s.page_views||0).toLocaleString();
      document.getElementById('st-ac').textContent = (s.analyze_count||0).toLocaleString();
    }
  }catch(e){}
}

// ── 查看會員 ──
async function loadMembers(){
  document.getElementById('sec-members').style.display='block';
  const el=document.getElementById('memberList');
  el.innerHTML='<div style="color:var(--text3);font-size:13px">載入中...</div>';
  try{
    const r=await fetch(`${API}/admin/members?key=${ADMIN_KEY}`);
    if(!r.ok) throw new Error();
    const data=await r.json();
    const members=data.members||data||[];
    if(!members.length){el.innerHTML='<div style="color:var(--text3);font-size:13px">尚無會員</div>';return;}
    const planMap={free:'免費',monthly:'月費',quarterly:'季費',yearly:'年費',test:'測試'};
    const fmtDate=s=>{if(!s)return'—';return String(s).slice(0,10);};
    const fmtDT=s=>{if(!s)return'—';return String(s).slice(0,16).replace('T',' ');};
    el.innerHTML=members.map(m=>{
      const isPaid=m.plan!=='free'&&m.is_active;
      const isExpired=m.plan!=='free'&&!m.is_active;
      const statusClass=isExpired?'status-expired':isPaid?'status-active':'status-free';
      const statusLabel=isExpired?'已到期':isPaid?'付費中':'免費';
      const planLabel=planMap[m.plan]||m.plan;
      return `<div class="mem-card">
        <div class="mem-head">
          <span class="mem-id">#${m.id||'—'}</span>
          <span class="mem-email">${m.email}</span>
          <span class="mem-status ${statusClass}">${statusLabel}</span>
        </div>
        <div class="mem-meta">
          <span>方案：${planLabel}</span>
          <span>到期：${fmtDate(m.expire_at)}</span>
          <span>建立：${fmtDate(m.created_at)}</span>
          <span>登入：${fmtDT(m.last_login)}</span>
        </div>
        <div class="mem-actions">
          <button class="mem-btn" onclick="quickReset('${m.email}')">🔐 重設密碼</button>
          <button class="mem-btn danger" onclick="doDelete('${m.email}')">🗑 刪除</button>
        </div>
      </div>`;
    }).join('');
  }catch(e){
    el.innerHTML='<div style="color:var(--up);font-size:13px">載入失敗，請確認後端連線</div>';
  }
}

// ── 開通帳號 ──
const PLAN_DAYS={monthly:30,quarterly:90,yearly:365};
async function doGrant(){
  const email=document.getElementById('grantEmail').value.trim();
  const plan=document.getElementById('grantPlan').value;
  const days=PLAN_DAYS[plan];
  const res=document.getElementById('grantResult');
  if(!email){res.textContent='請輸入 Email';res.className='result-box show error';return;}
  res.textContent='開通中...';res.className='result-box show';
  try{
    const r=await fetch(`${API}/admin/grant?key=${ADMIN_KEY}&email=${encodeURIComponent(email)}&plan=${plan}&days=${days}`,{method:'POST'});
    const data=await r.json();
    if(!r.ok){res.textContent='失敗：'+(data.detail||'未知錯誤');res.className='result-box show error';return;}
    const pwd=data.password||data.temp_password||'（請查看後端回傳）';
    res.textContent=`✅ 開通成功！\n帳號：${email}\n密碼：${pwd}\n方案：${plan}（${days}天）\n\n請將帳號密碼傳給對方。`;
    res.className='result-box show success';
    loadStats();
  }catch(e){
    res.textContent='連線失敗，請確認後端是否正常';
    res.className='result-box show error';
  }
}

// ── 備份 ──

function doBackup(){
  const url=`${API}/admin/backup-db?key=${ADMIN_KEY}`;
  window.open(url,'_blank');
  toast('📥 備份下載中...');

// ── 留言管理 ──
let allContactMsgs=[];
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtTime(iso){if(!iso)return'—';return String(iso).slice(0,16).replace('T',' ');}

async function loadContactMessages(){
  const el=document.getElementById('contactMsgList');
  el.innerHTML='<div style="color:var(--text3);font-size:13px">載入中...</div>';
  try{
    const r=await fetch(`${API}/api/contact/messages`);
    const data=await r.json();
    allContactMsgs=data.messages||[];
    renderContactMessages(document.getElementById('msgSearchInput').value.trim());
  }catch(e){
    el.innerHTML='<div style="color:var(--up);font-size:13px">載入失敗</div>';
  }
}

function filterContactMessages(kw){renderContactMessages(kw.trim());}

function renderContactMessages(kw=''){
  const el=document.getElementById('contactMsgList');
  let msgs=allContactMsgs;
  if(kw){const lk=kw.toLowerCase();msgs=msgs.filter(m=>m.email.toLowerCase().includes(lk)||m.message.toLowerCase().includes(lk)||m.name.toLowerCase().includes(lk));}
  if(!msgs.length){el.innerHTML='<div style="color:var(--text3);font-size:13px">無留言</div>';return;}
  el.innerHTML=msgs.map(m=>{
    const repliesHtml=(m.replies||[]).map(r=>`
      <div class="contact-reply-item">官方回覆（${fmtTime(r.created_at)}）：${escHtml(r.reply)}</div>
    `).join('');
    return `<div class="contact-card" id="cmsg-${m.id}">
      <div class="contact-head">
        <div>
          <div class="contact-email">${escHtml(m.email)}</div>
          <div class="contact-meta">${escHtml(m.name)} · ${fmtTime(m.created_at)} · 回覆 ${(m.replies||[]).length} 則</div>
        </div>
      </div>
      <div class="contact-body">${escHtml(m.message)}</div>
      ${repliesHtml?`<div class="contact-reply-list">${repliesHtml}</div>`:''}
      <div class="contact-actions">
        <button class="mem-btn" onclick="toggleReplyBox(${m.id})">✏️ 回覆</button>
        <button class="mem-btn danger" onclick="adminDeleteMsg(${m.id})">🗑 刪除</button>
        <select id="blockType-${m.id}" style="padding:6px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);color:var(--text2);font-size:12px;outline:none">
          <option value="comment">封鎖留言</option>
          <option value="login">封鎖登入</option>
        </select>
        <button class="mem-btn" onclick="doBlock('${escHtml(m.email)}',${m.id})">🚫 封鎖</button>
      </div>
      <div class="reply-box" id="reply-${m.id}">
        <textarea id="replyText-${m.id}" placeholder="輸入官方回覆…"></textarea>
        <div class="reply-box-btns">
          <button class="inline-btn" onclick="submitReply(${m.id})">送出回覆</button>
          <button class="inline-btn secondary" onclick="toggleReplyBox(${m.id})">取消</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleReplyBox(id){
  const box=document.getElementById(`reply-${id}`);
  box.style.display=box.style.display==='block'?'none':'block';
  if(box.style.display==='block') document.getElementById(`replyText-${id}`).focus();
}

async function submitReply(id){
  const txt=document.getElementById(`replyText-${id}`).value.trim();
  if(!txt){toast('請輸入回覆內容');return;}
  try{
    const r=await fetch(`${API}/api/contact/${id}/reply`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:ADMIN_PWD,reply:txt})
    });
    if(r.ok){toast('✅ 回覆已送出');loadContactMessages();}
    else{const d=await r.json();toast('❌ '+(d.detail||'失敗'));}
  }catch(e){toast('連線失敗');}
}

async function adminDeleteMsg(id){
  if(!confirm('確定要刪除這則留言？')) return;
  try{
    const r=await fetch(`${API}/api/contact/${id}`,{
      method:'DELETE',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:ADMIN_PWD})
    });
    if(r.ok){toast('✅ 已刪除');allContactMsgs=allContactMsgs.filter(m=>m.id!==id);renderContactMessages(document.getElementById('msgSearchInput').value.trim());}
    else{const d=await r.json();toast('❌ '+(d.detail||'失敗'));}
  }catch(e){toast('連線失敗');}
}

async function doBlock(email,msgId){
  const blockType=document.getElementById(`blockType-${msgId}`).value;
  const label=blockType==='comment'?'封鎖留言':'封鎖登入（停用帳號）';
  if(!confirm(`確定要對 ${email} 執行「${label}」？`)) return;
  try{
    const r=await fetch(`${API}/api/block`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({token:ADMIN_PWD,email,block_type:blockType})
    });
    if(r.ok){toast(`✅ 已封鎖 ${email}`);}
    else{const d=await r.json();toast('❌ '+(d.detail||'失敗'));}
  }catch(e){toast('連線失敗');}
}

// ── 封鎖名單 ──
async function loadBlocklist(){
  const el=document.getElementById('blockList');
  el.innerHTML='<div style="color:var(--text3);font-size:13px">載入中...</div>';
  try{
    const r=await fetch(`${API}/api/block?token=${ADMIN_PWD}`);
    const data=await r.json();
    const list=data.blocked||[];
    if(!list.length){el.innerHTML='<div style="color:var(--text3);font-size:13px">目前無封鎖記錄</div>';return;}
    el.innerHTML=list.map(b=>`
      <div class="block-item">
        <span class="block-email">${escHtml(b.email)}</span>
        <span class="block-type-badge ${b.block_type==='login'?'block-login':'block-comment'}">${b.block_type==='login'?'封鎖登入':'封鎖留言'}</span>
        <span style="font-size:11px;color:var(--text3);white-space:nowrap">${fmtTime(b.created_at)}</span>
        <button class="mem-btn" style="flex:0;white-space:nowrap;padding:5px 10px" onclick="doUnblock('${escHtml(b.email)}')">解除</button>
      </div>
    `).join('');
  }catch(e){
    el.innerHTML='<div style="color:var(--up);font-size:13px">載入失敗</div>';
  }
}

async function doUnblock(email){
  if(!confirm(`確定解除封鎖 ${email}？`)) return;
  try{
    const r=await fetch(`${API}/api/block/${encodeURIComponent(email)}?token=${ADMIN_PWD}`,{method:'DELETE'});
    if(r.ok){toast('✅ 已解除封鎖');loadBlocklist();}
    else{const d=await r.json();toast('❌ '+(d.detail||'失敗'));}
  }catch(e){toast('連線失敗');}
}

// ── 早鳥批次升級 ──
let _freeMembersCache = [];
async function loadFreeMembers(){
  const el = document.getElementById('freeMemberList');
  el.innerHTML = '<div style="color:var(--text3);font-size:13px">載入中...</div>';
  document.getElementById('earlybirdBatchRow').style.display = 'none';
  try{
    const r = await fetch(`${API}/admin/members?key=${ADMIN_KEY}`);
    if(!r.ok) throw new Error();
    const data = await r.json();
    const members = data.members || data || [];
    _freeMembersCache = members.filter(m => m.plan === 'free');
    if(!_freeMembersCache.length){
      el.innerHTML = '<div style="color:var(--text3);font-size:13px">目前無免費會員</div>';
      return;
    }
    el.innerHTML = `
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">共 ${_freeMembersCache.length} 位免費會員，勾選要升級的帳號：</div>
      ${_freeMembersCache.map((m,i)=>`
        <label style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--bg);border-radius:8px;margin-bottom:5px;cursor:pointer;font-size:13px">
          <input type="checkbox" class="earlybird-chk" value="${escHtml(m.email)}" style="width:15px;height:15px;accent-color:var(--green)"/>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(m.email)}</span>
          <span style="font-size:11px;color:var(--text3)">建立 ${fmtTime(m.created_at)}</span>
        </label>`).join('')}`;
    document.getElementById('earlybirdBatchRow').style.display = 'flex';
    document.getElementById('selectAllBtn').textContent = '全選';
  }catch(e){
    el.innerHTML = '<div style="color:var(--up);font-size:13px">載入失敗</div>';
  }
}

function toggleSelectAll(){
  const chks = document.querySelectorAll('.earlybird-chk');
  const allChecked = [...chks].every(c=>c.checked);
  chks.forEach(c=>c.checked=!allChecked);
  document.getElementById('selectAllBtn').textContent = allChecked ? '全選' : '取消全選';
}

async function doEarlyBirdUpgrade(){
  const chks = [...document.querySelectorAll('.earlybird-chk:checked')];
  if(!chks.length){ toast('請先勾選要升級的會員'); return; }
  const planVal = document.getElementById('earlybirdPlan').value;
  const plan = planVal === 'quarterly90' ? 'quarterly' : 'monthly';
  const days = planVal === 'quarterly90' ? 90 : 30;
  const emails = chks.map(c=>c.value);
  if(!confirm(`確定批次升級 ${emails.length} 位會員為${plan==='quarterly'?'季費（90天）':'月費（30天）'}並寄通知信？`)) return;
  const res = document.getElementById('earlybirdResult');
  res.textContent = `升級中... (0/${emails.length})`;
  res.className = 'result-box show';
  try{
    const r = await fetch(`${API}/admin/batch-upgrade?key=${ADMIN_KEY}`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({emails, plan, days})
    });
    const data = await r.json();
    if(!r.ok){ res.textContent='失敗：'+(data.detail||'未知錯誤'); res.className='result-box show error'; return; }
    const ok = data.results.filter(x=>x.ok);
    const fail = data.results.filter(x=>!x.ok);
    const mailOk = ok.filter(x=>x.email_sent).length;
    let txt = `✅ 升級完成！\n成功：${ok.length} 位，失敗：${fail.length} 位\n已寄信：${mailOk} 封`;
    if(fail.length) txt += '\n\n失敗清單：\n'+fail.map(f=>`${f.email}：${f.reason}`).join('\n');
    res.textContent = txt;
    res.className = 'result-box show success';
    loadStats();
  }catch(e){
    res.textContent = '連線失敗';
    res.className = 'result-box show error';
  }
}

// ── 開盤熱門股手動觸發 ──
async function doRunOpeningScan(btn){
  btn.disabled = true;
  btn.textContent = '⏳ 執行中...';
  const res = document.getElementById('picksResult');
  res.className = 'result-box show';
  res.textContent = '開盤熱門股抓取中...';
  try{
    const r = await fetch(`${API}/admin/run-opening-scan?key=${ADMIN_KEY}`, {
      method:'POST', signal: AbortSignal.timeout(60000)
    });
    const data = await r.json();
    if(r.ok){
      res.textContent = `✅ ${data.message || '完成'}`;
      res.className = 'result-box show success';
    } else {
      res.textContent = '❌ 失敗：'+(data.detail||'未知錯誤');
      res.className = 'result-box show error';
    }
  }catch(e){
    res.textContent = '❌ 連線失敗或逾時：'+e.message;
    res.className = 'result-box show error';
  }finally{
    btn.disabled = false;
    btn.textContent = '⚡ 立即抓取開盤熱門股';
  }
}

async function doClearCache(btn){
  btn.disabled = true;
  btn.textContent = '⏳ 清除中...';
  try{
    const r = await fetch(`${API}/admin/clear-cache?key=${ADMIN_KEY}`, {method:'POST'});
    const data = await r.json();
    toast(r.ok ? data.message : '❌ '+(data.detail||'失敗'));

    btn.disabled = false;
    btn.textContent = '🗑️ 清除分析快取';
  }
